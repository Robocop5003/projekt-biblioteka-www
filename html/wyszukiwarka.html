<!DOCTYPE html>

<html lang="pl">

<!-- ========== Head ========== -->

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Lekturoteka</title>

    <link rel="stylesheet" href="../css/style.css">
    <script defer src="../js/script.js"></script>
    <script defer src="../js/wyszukiwarka.js"></script>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"/>

    <!-- === Skrypt ustawiający odpowiedni motyw przy starcie strony === -->
    
    <script>
        const theme = localStorage.getItem("theme") || "light";
        if (theme == "dark") {document.documentElement.classList.add("dark");} 
        else {document.documentElement.classList.add("light");}
    </script>
</head>

<!-- ========== Body ========== -->

<body id="browser">

    <!-- === Sticky na górze === -->

    <komponent-naglowek></komponent-naglowek>

    <!-- === Menu otwierane po lewej === -->

    <komponent-nawigacja></komponent-nawigacja>

    <!-- === Wyszukiwarka === -->

    <komponent-wyszukiwarka></komponent-wyszukiwarka>

    <main>
        <div id="browserList">
        </div>
    </main>
    <nav id="browserPager">
        <ul id="browserPagerPages" class="unselectable">
            <li id="pagerPrev"><span class="material-symbols-outlined">arrow_back_ios</span></li>
            <li id="pagerNext"><span class="material-symbols-outlined">arrow_forward_ios</span></li>
        </ul>
    </nav>
    
</body>
</html>
