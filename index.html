<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=dark_mode,light_mode,menu" />
    <script>
        const theme = localStorage.getItem("theme") || "dark";
        if (theme === "dark") {
            document.documentElement.classList.add("dark");
        } else {
            document.documentElement.classList.add("light");
        }
    </script>
</head>

<body>
    <div id="head" class="sticky">
        <header>
            <span id="menu-icon" alt="menu" class="material-symbols-outlined unselectable">menu</span>
            <h1 id="logo">Biblioteka</h1>
            <span id="mode-switch" alt="zmiana motywu" class="material-symbols-outlined unselectable"></span>
        </header>
    </div>
    <div id="navigacja">
        <nav>
            <ul>
                <li><a href="#">Gatunki</a></li>
                <li><a href="#">Epoki</a></li>
                <li><a href="#">Rodzaje</a></li>
                <li><a href="#">Motywy</a></li>
            </ul>
        </nav>
    </div>

    <main>
        <section id="wyszukiwarka">
            <input type="text" placeholder="Wyszukaj ksiazke...">
        </section>

        <section id="polecane">
            <h1>Polecane:</h1>
            <div id="polecane_ksiazki">
                <div class="ksiazka"></div>
                <div class="ksiazka"></div>
                <div class="ksiazka"></div>
                <div class="ksiazka"></div>
                <div class="ksiazka"></div>
                <div class="ksiazka"></div>
                <div class="ksiazka"></div>
                <div class="ksiazka"></div>
                <div class="ksiazka"></div>
                <div class="ksiazka"></div>
                <div class="ksiazka"></div>
                <div class="ksiazka"></div>
            </div>
        </section>
        
    </main>
    <script src="script.js"></script>
</body>
</html>
